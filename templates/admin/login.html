<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Administration - Aisance Kalonji</title>

    <!-- Polices Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Activation du mode sombre manuel
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        accent: '#3b82f6',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="antialiased dark flex items-center justify-center min-h-screen relative overflow-hidden">

    <!-- ARRIÈRE-PLAN ANIMÉ -->
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="relative z-10 glass-premium p-8 md:p-12 rounded-[32px] shadow-2xl w-full max-w-md border border-[var(--glass-border)]">
        <div class="text-center mb-8">
            <h1 class="font-display text-3xl font-medium text-adaptive">Administration</h1>
            <p class="font-sans text-sm text-adaptive-muted mt-2 font-light">Connectez-vous pour accéder à votre espace</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="mb-6 space-y-2">
                    {% for category, message in messages %}
                        <div class="p-4 text-sm rounded-xl font-medium {% if category == 'error' %}bg-red-500/10 text-red-500 border border-red-500/20{% else %}bg-emerald-500/10 text-emerald-500 border border-emerald-500/20{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('admin.login') }}" method="POST">
            <div class="mb-6">
                <label for="username" class="block font-mono text-xs text-adaptive-muted mb-2 uppercase tracking-wider">Nom d'utilisateur</label>
                <input type="text" id="username" name="username" required
                       class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-adaptive placeholder-adaptive-muted">
            </div>
            <div class="mb-8">
                <label for="password" class="block font-mono text-xs text-adaptive-muted mb-2 uppercase tracking-wider">Mot de passe</label>
                <input type="password" id="password" name="password" required
                       class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-all text-adaptive placeholder-adaptive-muted">
            </div>
            <button type="submit"
                    class="w-full btn-solid !py-3 !text-base shadow-lg hover:shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all flex items-center justify-center group">
                Se connecter <i class="fas fa-arrow-right ml-2 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </form>
    </div>

</body>
</html>
