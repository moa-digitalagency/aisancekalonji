{% extends "admin/base.html" %}

{% block header_title %}Paramètres Globaux{% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm p-6 max-w-4xl mx-auto mb-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Informations de Contact et Réseaux Sociaux</h2>

    <form method="POST" action="{{ url_for('admin.settings') }}" class="space-y-8">

        <!-- Section: Réseaux Sociaux -->
        <div>
            <h3 class="text-lg font-medium text-gray-900 border-b pb-2 mb-4">Liens des Réseaux Sociaux</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label for="facebook" class="block text-sm font-medium text-gray-700">Facebook URL</label>
                    <input type="url" name="facebook" id="facebook" value="{{ settings.get('facebook', '') }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="https://facebook.com/votre_profil">
                </div>
                <div>
                    <label for="instagram" class="block text-sm font-medium text-gray-700">Instagram URL</label>
                    <input type="url" name="instagram" id="instagram" value="{{ settings.get('instagram', '') }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="https://instagram.com/votre_profil">
                </div>
                <div>
                    <label for="x" class="block text-sm font-medium text-gray-700">X (Twitter) URL</label>
                    <input type="url" name="x" id="x" value="{{ settings.get('x', '') }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="https://x.com/votre_profil">
                </div>
                <div>
                    <label for="linkedin" class="block text-sm font-medium text-gray-700">LinkedIn URL</label>
                    <input type="url" name="linkedin" id="linkedin" value="{{ settings.get('linkedin', '') }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="https://linkedin.com/in/votre_profil">
                </div>
                <div>
                    <label for="whatsapp" class="block text-sm font-medium text-gray-700">WhatsApp (Lien ou Numéro)</label>
                    <input type="text" name="whatsapp" id="whatsapp" value="{{ settings.get('whatsapp', '') }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="https://wa.me/numéro">
                </div>
            </div>
        </div>

        <!-- Section: Informations de Contact -->
        <div>
            <h3 class="text-lg font-medium text-gray-900 border-b pb-2 mb-4">Coordonnées de Contact</h3>
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700">Téléphone Principal</label>
                        <input type="text" name="phone" id="phone" value="{{ settings.get('phone', '') }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="+33 6 00 00 00 00">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email de Contact</label>
                        <input type="email" name="email" id="email" value="{{ settings.get('email', '') }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="contact@exemple.com">
                    </div>
                </div>
                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700">Adresse Complète</label>
                    <textarea name="address" id="address" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border" placeholder="Numéro, Rue, Code Postal, Ville, Pays">{{ settings.get('address', '') }}</textarea>
                </div>
            </div>
        </div>

        <div class="pt-6 border-t border-gray-200 flex justify-end">
            <button type="submit" class="bg-gray-800 hover:bg-black text-white font-bold py-2 px-6 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out">
                Enregistrer tous les paramètres
            </button>
        </div>
    </form>
</div>
{% endblock %}
