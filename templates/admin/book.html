{% extends "admin/base.html" %}

{% block header_title %}Gestion du Livre (Vade-mecum){% endblock %}

{% block content %}
<div class="bg-white rounded-lg shadow-sm p-6 max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Modifier la section Livre</h2>

    <form method="POST" action="{{ url_for('admin.book') }}" class="space-y-6">
        <div>
            <label for="title" class="block text-sm font-medium text-gray-700">Titre</label>
            <p class="text-xs text-gray-500 mb-1">Vous pouvez utiliser des balises HTML basiques (ex: &lt;span class="text-indigo-600"&gt;texte&lt;/span&gt;) pour la mise en forme.</p>
            <input type="text" name="title" id="title" value="{{ book.title or '' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
        </div>

        <div>
            <label for="subtitle" class="block text-sm font-medium text-gray-700">Sous-titre / Auteur</label>
            <input type="text" name="subtitle" id="subtitle" value="{{ book.subtitle or '' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
            <textarea name="description" id="description" rows="5" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">{{ book.description or '' }}</textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="cta_text" class="block text-sm font-medium text-gray-700">Texte du Bouton (CTA)</label>
                <input type="text" name="cta_text" id="cta_text" value="{{ book.cta_text or '' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
            </div>

            <div>
                <label for="cta_link" class="block text-sm font-medium text-gray-700">Lien du Bouton (CTA)</label>
                <input type="text" name="cta_link" id="cta_link" value="{{ book.cta_link or '' }}" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm p-2 border">
            </div>
        </div>

        <div class="pt-4 border-t border-gray-200 flex justify-end">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out">
                Enregistrer les modifications
            </button>
        </div>
    </form>
</div>
{% endblock %}
