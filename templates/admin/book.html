{% extends "admin/base.html" %}

{% block header_title %}Gestion du Livre (Vade-mecum){% endblock %}

{% block content %}
<div class="glass-premium bg-white/5 border border-white/10 rounded-[32px] p-6 max-w-4xl mx-auto mb-8">
    <h2 class="text-2xl font-bold text-white mb-6">Modifier la section Livre</h2>

    <form method="POST" action="{{ url_for('admin.book') }}" class="space-y-6">
        <div>
            <label for="title" class="block text-sm font-medium text-gray-200">Titre</label>
            <p class="text-xs text-gray-400 mb-1">Vous pouvez utiliser des balises HTML basiques (ex: &lt;span class="text-accent"&gt;texte&lt;/span&gt;) pour la mise en forme.</p>
            <input type="text" name="title" id="title" value="{{ book.title or '' }}" class="mt-1 block w-full rounded-xl bg-black/20 border border-white/10 text-white shadow-sm focus:border-accent focus:ring-accent sm:text-sm p-3">
        </div>

        <div>
            <label for="subtitle" class="block text-sm font-medium text-gray-200">Sous-titre / Auteur</label>
            <input type="text" name="subtitle" id="subtitle" value="{{ book.subtitle or '' }}" class="mt-1 block w-full rounded-xl bg-black/20 border border-white/10 text-white shadow-sm focus:border-accent focus:ring-accent sm:text-sm p-3">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-200">Description</label>
            <textarea name="description" id="description" rows="5" class="mt-1 block w-full rounded-xl bg-black/20 border border-white/10 text-white shadow-sm focus:border-accent focus:ring-accent sm:text-sm p-3">{{ book.description or '' }}</textarea>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="cta_text" class="block text-sm font-medium text-gray-200">Texte du Bouton (CTA)</label>
                <input type="text" name="cta_text" id="cta_text" value="{{ book.cta_text or '' }}" class="mt-1 block w-full rounded-xl bg-black/20 border border-white/10 text-white shadow-sm focus:border-accent focus:ring-accent sm:text-sm p-3">
            </div>

            <div>
                <label for="cta_link" class="block text-sm font-medium text-gray-200">Lien du Bouton (CTA)</label>
                <input type="text" name="cta_link" id="cta_link" value="{{ book.cta_link or '' }}" class="mt-1 block w-full rounded-xl bg-black/20 border border-white/10 text-white shadow-sm focus:border-accent focus:ring-accent sm:text-sm p-3">
            </div>
        </div>

        <div class="pt-4 border-t border-white/10 flex justify-end">
            <button type="submit" class="bg-accent/80 hover:bg-accent text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline transition duration-150 ease-in-out">
                Enregistrer les modifications
            </button>
        </div>
    </form>
</div>
{% endblock %}
