<!DOCTYPE html>
<html lang="{{ session.get('lang', 'fr') }}" {% if session.get('lang', 'fr') == 'ar' %}dir="rtl"{% else %}dir="ltr"{% endif %} class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aisance KALONJI - Erreur{% endblock %}</title>

    <!-- Polices Premium -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        accent: '#3b82f6',
                    }
                }
            }
        }
    </script>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <!-- Lottie Web Player -->
    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem;
        }
    </style>
</head>
<body class="antialiased">

    <!-- ARRIÈRE-PLAN ANIMÉ (Même que index.html) -->
    <div class="blob-container">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="fixed w-full z-50 p-4 md:p-6 transition-all duration-500">
        <div class="relative w-full max-w-7xl mx-auto">
            <div class="glass-premium px-6 py-4 rounded-full flex items-center justify-between relative z-20">
                <a href="{{ url_for('main.index') }}" class="flex-shrink-0 transition-transform hover:scale-105">
                    <div class="font-display text-lg md:text-xl tracking-widest uppercase text-adaptive">
                        <span class="font-normal">Aisance</span> <span class="font-black">KALONJI</span>
                    </div>
                </a>

                <div class="flex items-center space-x-2 sm:space-x-4">
                    <a href="{{ url_for('main.index') }}" class="btn-solid !py-2 !px-6 !text-sm flex items-center gap-2">
                        <i class="fas fa-home"></i> Retour à l'accueil
                    </a>
                </div>
            </div>
        </div>
    </div>

    <main>
        <section class="error-container">
            <div class="absolute inset-x-0 bottom-[-15%] h-[50%] pointer-events-none select-none z-0">
                <div class="absolute bottom-[-10%] left-[0%] w-[60%] h-[100%] rounded-full bg-blue-600/40 dark:bg-blue-500/30 blur-[120px] animate-[pulse_8s_cubic-bezier(0.4,0,0.6,1)_infinite]"></div>
                <div class="absolute bottom-[-20%] right-[0%] w-[70%] h-[100%] rounded-full bg-purple-600/40 dark:bg-purple-500/30 blur-[140px] animate-[pulse_10s_cubic-bezier(0.4,0,0.6,1)_infinite_reverse]"></div>
            </div>

            <div class="relative z-10 w-full max-w-5xl mx-auto">
                <div class="glass-premium rounded-[40px] md:rounded-[60px] p-8 md:p-12 lg:p-16 border-[var(--glass-border)] shadow-2xl overflow-hidden relative">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </section>
    </main>

</body>
</html>
