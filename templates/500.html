{% extends "error_base.html" %}

{% block title %}Erreur 500 - Serveur en Feu | Aisance Kalonji{% endblock %}

{% block content %}
<div class="relative min-h-[80vh] flex flex-col items-center justify-center p-4">

    <!-- Lottie Background Placeholder -->
    <div class="absolute inset-0 z-0 opacity-20 pointer-events-none flex items-center justify-center overflow-hidden">
        <lottie-player
            src="https://lottie.host/e3595b14-8f2e-4340-9bfa-36eb8b0a99aa/4aC8xR9fHb.json"
            background="transparent"
            speed="1"
            style="width: 100%; height: 100%; max-width: 600px;"
            loop
            autoplay>
        </lottie-player>
    </div>

    <!-- Content Card -->
    <div class="glass-effect rounded-2xl p-8 md:p-12 max-w-2xl w-full text-center relative z-10 border border-white/10 shadow-2xl backdrop-blur-md">

        <!-- Header Section -->
        <div class="mb-8">
            <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-medium tracking-wider uppercase mb-6 shadow-[0_0_15px_rgba(239,68,68,0.1)]">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Erreur Interne
            </span>
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold text-white mb-4 tracking-tight leading-tight drop-shadow-lg">
                Le serveur a <span class="text-red-500 animate-pulse">explosé</span>.
            </h1>
            <p class="text-lg text-gray-400 max-w-lg mx-auto leading-relaxed">
                Nos techniciens (et quelques pompiers) sont déjà sur le coup. Ne paniquez pas, on gère la situation.
            </p>
        </div>

        <div class="text-[10rem] md:text-[14rem] font-black text-white/5 select-none absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 -z-10 pointer-events-none" style="filter: blur(4px);">
            500
        </div>

        <div class="flex flex-col sm:flex-row gap-4 justify-center items-center">
            <button onclick="window.location.reload();"
                    class="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-white transition-all duration-300 bg-red-600 rounded-full hover:bg-red-500 hover:scale-105 hover:shadow-[0_0_20px_rgba(239,68,68,0.4)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-600 w-full sm:w-auto">
                <svg class="w-5 h-5 mr-2 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Réessayer
            </button>
            <a href="/"
               class="inline-flex items-center justify-center px-8 py-4 font-bold text-gray-300 transition-all duration-300 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 hover:text-white hover:border-white/20 w-full sm:w-auto">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                Accueil
            </a>
        </div>
    </div>
</div>
{% endblock %}
